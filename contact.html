<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    background: linear-gradient(135deg, #dbeafe, #ffffff);
    font-family: Arial;
}

.navbar {
    background: #0d1b2a;
}

.card-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.form-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    margin-top: 40px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.btn-send {
    background: #0d6efd;
    color: white;
    padding: 10px;
    border-radius: 8px;
    border: none;
}
</style>

</head>

<body>

<!-- ✅ PROFESSIONAL NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
  <div class="container">

    <!-- LOGO -->
    <a class="navbar-brand fw-bold" href="index.html">Kerala Ministry</a>

    <!-- MOBILE BUTTON -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- MENU -->
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">

        <!-- HOME -->
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>

        <!-- ABOUT -->
        <li class="nav-item">
          <a class="nav-link" href="about.html">About</a>
        </li>

        <!-- MINISTERS -->
        <li class="nav-item">
          <a class="nav-link" href="ministers.html">Ministers</a>
        </li>

        <!-- CONTACT -->
        <li class="nav-item">
          <a class="nav-link active" href="contact.html">Contact</a>
        </li>

      </ul>
    </div>

  </div>
</nav>

<div class="text-center mt-5">
    <h1>Contact Us</h1>
</div>

<div class="container mt-4">
    <div class="row g-3">

        <div class="col-md-4">
            <div class="card-box">
                <i class=" text-primary"></i>
                <h5>Email</h5>
                <p>info@keralamini.gov.in</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <i class=" text-success"></i>
                <h5>Phone</h5>
                <p>+91 471 123 4567</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <i class=" text-danger"></i>
                <h5>Address</h5>
                <p>Kerala Secretariat</p>
            </div>
        </div>

    </div>

    <div class="form-box">
        <h4>Send Message</h4>

        <input class="form-control mb-3" placeholder="Full Name">
        <input class="form-control mb-3" placeholder="Email">
        <textarea class="form-control mb-3" placeholder="Message"></textarea>

        <button class="btn-send w-100">Send</button>
    </div>

</div>

<!-- ✅ IMPORTANT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
